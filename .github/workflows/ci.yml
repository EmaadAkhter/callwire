name: Callwire CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # The Go integration tests expect the Python virtualenv at python/.venv/bin/python
      - name: Setup Python Virtual Environment
        run: |
          cd python
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install msgpack

      # Run all test suites
      - name: Run Go tests (including Rust & Python integration)
        run: |
          cd go/callwire
          go test -v ./...

      - name: Run Python unit/smoke/batch tests
        run: |
          cd python
          .venv/bin/python test_self.py
          .venv/bin/python test_smoke.py
          .venv/bin/python test_client.py
          .venv/bin/python test_streaming.py
          .venv/bin/python test_batch.py
          .venv/bin/python test_registry.py

      - name: Run Rust tests
        run: |
          cd rust
          cargo test -- --nocapture
