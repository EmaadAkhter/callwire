# callwire.toml
# ────────────────────────────────────────────────────────────
# Generated by `python -m callwire init`
# ────────────────────────────────────────────────────────────

[project]
name = "callwire-project"
version = "1.0.0"

# ── Worker services ─────────────────────────────────────────

[services.go-server-worker]
dev_cmd  = "cd go/callwire && go run ../../examples/1_standalone/go_server.go"
prod_cmd = "./bin/go-server-worker"

[services.orchestrated-rust-worker]
dev_cmd  = "cd rust && cargo run --quiet --example orchestrated-rust-worker"
prod_cmd = "./bin/orchestrated-rust-worker"
