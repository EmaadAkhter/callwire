syntax = "proto3";

package grpcbench;

option go_package = "github.com/emaad/callwire/grpcbenchpb;grpcbenchpb";

service BenchService {
  rpc Noop(NoopRequest) returns (NoopReply);
  rpc Add(AddRequest) returns (AddReply);
}

message NoopRequest {}
message NoopReply {}

message AddRequest {
  int64 a = 1;
  int64 b = 2;
}

message AddReply {
  int64 sum = 1;
}

